# BCNet training config — example tuned for an 8 GB+ VRAM GPU
# (e.g. RTX 3060 / 3070 / 4060 / 2080).
#
# Use this as a starting point if you have more headroom.
# Compared to `bcnet_train.yaml` it:
#   - unfreezes the top two ResNet stages (FREEZE_AT: 2 instead of 5)
#   - doubles ROI proposal sampling (128 vs 64)
#   - doubles input resolution
#   - lengthens the schedule and the LR
#
# For 24 GB cards (3090/4090) you can also set IMS_PER_BATCH: 2 (and scale
# BASE_LR to 0.005 by the linear scaling rule), bump CONV_DIM to 256 ->
# leave it, and disable AMP for cleaner gradients if you wish.

_BASE_: "bcnet_train.yaml"

MODEL:
  BACKBONE:
    FREEZE_AT: 2          # unfreeze ResNet stage3 + stage4
  ROI_HEADS:
    BATCH_SIZE_PER_IMAGE: 128
    SCORE_THRESH_TEST: 0.3
  RPN:
    PRE_NMS_TOPK_TRAIN: 2000
    POST_NMS_TOPK_TRAIN: 1000
    PRE_NMS_TOPK_TEST: 1000
    POST_NMS_TOPK_TEST: 500

INPUT:
  MIN_SIZE_TRAIN: (640, 672, 704, 736, 768, 800)
  MAX_SIZE_TRAIN: 1333
  MIN_SIZE_TEST: 800
  MAX_SIZE_TEST: 1333

SOLVER:
  IMS_PER_BATCH: 2
  BASE_LR: 0.005           # linear scale: 0.02 * 2/16 + a small bump
  MAX_ITER: 30000
  STEPS: (20000, 27000)
  WARMUP_ITERS: 1000
  CHECKPOINT_PERIOD: 5000
  AMP:
    ENABLED: True

TEST:
  EVAL_PERIOD: 5000

OUTPUT_DIR: "./output/run_8gb"

BCNET:
  HEAD:
    USE_BOUNDARY: True     # safe to enable when you have enough data
    USE_GCN: True
